<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Configurações do site -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título da aba -->
    <title>Ouvidoria-CECEM</title>

    <!-- Ligação com o CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- CABEÇALHO -->
    <header>
        <h1>Ouvidoria-CECEM</h1>
        <p>Seu espaço para sugestões, reclamações e elogios.</p>
    </header>

    <!-- MENU -->
    <nav>
        <ul>
            <li><a href="#">Início</a></li>
            <li><a href="#">Ouvidoria</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <main>

        <!-- FORMULÁRIO -->
        <section class="formulario">
            <h2>Envie sua mensagem</h2>

            <form>

                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="Digite seu nome">

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Digite seu email">

                <label for="tipo">Tipo de mensagem:</label>
                <select id="tipo">
                    <option>Sugestão</option>
                    <option>Reclamação</option>
                    <option>Elogio</option>
                </select>

                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" rows="6"></textarea>

                <button type="submit">Enviar</button>

            </form>
        </section>

    </main>

    <!-- RODAPÉ -->
    <footer>
        <p>© 2026 Ouvidoria-CECEM | Projeto Agrinho</p>
    </footer>

    <!-- Ligação com JavaScript -->
    <script src="js/app.js"></script>

</body>
</html>
